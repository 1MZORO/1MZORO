<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <!-- Clip paths to create the actual split -->
    <clipPath id="topHalf">
      <polygon points="0,0 900,0 900,140 0,160"/>
    </clipPath>
    <clipPath id="bottomHalf">
      <polygon points="0,160 900,140 900,300 0,300"/>
    </clipPath>
    
    <!-- Glow filter -->
    <filter id="slashGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <style>
    @keyframes splitTop {
      0%, 15% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
      30% { transform: translate(-15px, -8px) rotate(-1.5deg); opacity: 1; }
      50% { transform: translate(-20px, -12px) rotate(-2deg); opacity: 0.85; }
      70% { transform: translate(-10px, -5px) rotate(-1deg); opacity: 0.95; }
      85%, 100% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    }

    @keyframes splitBottom {
      0%, 15% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
      30% { transform: translate(15px, 8px) rotate(1.5deg); opacity: 1; }
      50% { transform: translate(20px, 12px) rotate(2deg); opacity: 0.85; }
      70% { transform: translate(10px, 5px) rotate(1deg); opacity: 0.95; }
      85%, 100% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    }

    @keyframes slashSwing {
      0% { stroke-dashoffset: 1200; opacity: 0; }
      10% { opacity: 0; }
      15% { opacity: 1; }
      35% { stroke-dashoffset: 0; opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 0; stroke-dashoffset: 0; }
    }

    @keyframes slashFlash {
      0%, 14% { opacity: 0; }
      15% { opacity: 0; }
      25% { opacity: 0.6; }
      35% { opacity: 0.8; }
      45% { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes sparkle1 {
      0%, 25% { opacity: 0; transform: translate(0,0) scale(0); }
      30% { opacity: 1; transform: translate(-10px,-15px) scale(1.5); }
      50% { opacity: 0; transform: translate(-25px,-35px) scale(0); }
      100% { opacity: 0; }
    }
    @keyframes sparkle2 {
      0%, 28% { opacity: 0; transform: translate(0,0) scale(0); }
      33% { opacity: 1; transform: translate(8px,-20px) scale(1.2); }
      53% { opacity: 0; transform: translate(20px,-40px) scale(0); }
      100% { opacity: 0; }
    }
    @keyframes sparkle3 {
      0%, 26% { opacity: 0; transform: translate(0,0) scale(0); }
      31% { opacity: 1; transform: translate(15px,10px) scale(1.3); }
      51% { opacity: 0; transform: translate(30px,25px) scale(0); }
      100% { opacity: 0; }
    }

    @keyframes titleGlow {
      0%, 100% { filter: url(#textGlow); }
      50% { filter: brightness(1.5) url(#textGlow); }
    }

    .bg { fill: #0d1117; }

    .top-piece {
      animation: splitTop 5s ease-in-out infinite;
      transform-origin: 450px 150px;
    }
    .bottom-piece {
      animation: splitBottom 5s ease-in-out infinite;
      transform-origin: 450px 150px;
    }

    .main-slash {
      stroke: #00ff88;
      stroke-width: 3;
      stroke-dasharray: 1200;
      stroke-linecap: round;
      filter: url(#slashGlow);
      animation: slashSwing 5s ease-out infinite;
    }
    .slash-thick {
      stroke: rgba(0,255,136,0.15);
      stroke-width: 25;
      stroke-dasharray: 1200;
      stroke-linecap: round;
      animation: slashSwing 5s ease-out infinite;
    }
    .slash-flash {
      fill: rgba(0,255,136,0.08);
      animation: slashFlash 5s ease-in-out infinite;
    }

    .spark {
      fill: #00ff88;
    }
    .spark1 { animation: sparkle1 5s ease-out infinite; }
    .spark2 { animation: sparkle2 5s ease-out infinite; }
    .spark3 { animation: sparkle3 5s ease-out infinite; }

    .title {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 62px;
      font-weight: bold;
      fill: #00ff88;
      letter-spacing: 8px;
      animation: titleGlow 3s ease-in-out infinite;
    }
    .subtitle {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 16px;
      fill: #555555;
      letter-spacing: 4px;
    }
    .desc {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      fill: #444444;
      letter-spacing: 2px;
    }
  </style>

  <!-- ===== TOP HALF (splits upward-left) ===== -->
  <g class="top-piece" clip-path="url(#topHalf)">
    <rect class="bg" width="900" height="300" rx="15"/>
    <text class="title" x="450" y="120" text-anchor="middle">☠ PIRATE HUNTER ☠</text>
    <text class="subtitle" x="450" y="195" text-anchor="middle">RORONOA ZORO</text>
    <text class="desc" x="450" y="230" text-anchor="middle">First Mate • Three Sword Style • King of Hell</text>
  </g>

  <!-- ===== BOTTOM HALF (splits downward-right) ===== -->
  <g class="bottom-piece" clip-path="url(#bottomHalf)">
    <rect class="bg" width="900" height="300" rx="15"/>
    <text class="title" x="450" y="120" text-anchor="middle">☠ PIRATE HUNTER ☠</text>
    <text class="subtitle" x="450" y="195" text-anchor="middle">RORONOA ZORO</text>
    <text class="desc" x="450" y="230" text-anchor="middle">First Mate • Three Sword Style • King of Hell</text>
  </g>

  <!-- ===== SLASH FLASH (wide glow behind slash) ===== -->
  <polygon class="slash-flash" points="0,170 900,130 900,145 0,185"/>

  <!-- ===== SLASH LINES ===== -->
  <line class="slash-thick" x1="-50" y1="165" x2="950" y2="138"/>
  <line class="main-slash" x1="-50" y1="162" x2="950" y2="135"/>
  <line class="main-slash" x1="-30" y1="168" x2="930" y2="142" style="stroke-width:1.5; animation-delay: 0.1s;"/>

  <!-- ===== SPARKS at slash impact points ===== -->
  <g class="spark spark1"><circle cx="300" cy="155" r="2.5"/></g>
  <g class="spark spark2"><circle cx="450" cy="150" r="2"/></g>
  <g class="spark spark3"><circle cx="600" cy="145" r="2.5"/></g>
  <g class="spark spark1" style="animation-delay:0.2s"><circle cx="200" cy="158" r="1.8"/></g>
  <g class="spark spark2" style="animation-delay:0.15s"><circle cx="700" cy="142" r="2.2"/></g>

  <!-- Border -->
  <rect x="1" y="1" width="898" height="298" rx="15" ry="15" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
</svg>